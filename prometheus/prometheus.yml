global:
  scrape_interval: 2s # Accelerated interval to make alerts fire fast

scrape_configs:
  - job_name: "sentinel-flux-backend"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["127.0.0.1:8085"] # Uses localhost loop now that port-forwarding is clear
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093'] 